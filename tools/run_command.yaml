identity:
  name: run_command
  author: daytonaio
  label:
    en_US: Run Command
    zh_Hans: Run Command
    ja_JP: Run Command
    pt_BR: Run Command
description:
  human:
    en_US: Run a shell command in a Daytona sandbox and return the output.
    zh_Hans: Run a shell command in a Daytona sandbox and return the output.
    ja_JP: Run a shell command in a Daytona sandbox and return the output.
    pt_BR: Run a shell command in a Daytona sandbox and return the output.
  llm: >
    Execute a shell command in a Daytona sandbox. Useful for installing packages,
    running scripts, file operations, and any Linux command. Supports optional working
    directory (cwd) and environment variables. If no sandbox_id is provided, a new
    ephemeral sandbox is created automatically. Returns combined output (stdout and
    stderr) and exit code. IMPORTANT — when your command generates output files, use a
    persistent sandbox (provide sandbox_id via create_sandbox first) and then call
    download_file to deliver the generated file to the user as a downloadable attachment.
parameters:
  - name: command
    type: string
    required: true
    label:
      en_US: Command
      zh_Hans: Command
      ja_JP: Command
      pt_BR: Command
    human_description:
      en_US: The shell command to execute in the sandbox.
      zh_Hans: The shell command to execute in the sandbox.
      ja_JP: The shell command to execute in the sandbox.
      pt_BR: The shell command to execute in the sandbox.
    llm_description: The shell command to execute in the Daytona sandbox. This runs in a standard Linux environment.
    form: llm
  - name: cwd
    type: string
    required: false
    label:
      en_US: Working Directory
      zh_Hans: Working Directory
      ja_JP: Working Directory
      pt_BR: Working Directory
    human_description:
      en_US: Working directory for command execution (e.g. /home/daytona/project). Defaults to sandbox working directory.
      zh_Hans: Working directory for command execution (e.g. /home/daytona/project). Defaults to sandbox working directory.
      ja_JP: Working directory for command execution (e.g. /home/daytona/project). Defaults to sandbox working directory.
      pt_BR: Working directory for command execution (e.g. /home/daytona/project). Defaults to sandbox working directory.
    llm_description: Working directory for command execution (e.g. /home/daytona/project). Defaults to sandbox working directory.
    form: llm
    default: ""
  - name: env_vars
    type: string
    required: false
    label:
      en_US: Environment Variables (JSON)
      zh_Hans: Environment Variables (JSON)
      ja_JP: Environment Variables (JSON)
      pt_BR: Environment Variables (JSON)
    human_description:
      en_US: "Environment variables for the command, as a JSON object string. Example: {\"NODE_ENV\": \"production\"}"
      zh_Hans: "Environment variables for the command, as a JSON object string. Example: {\"NODE_ENV\": \"production\"}"
      ja_JP: "Environment variables for the command, as a JSON object string. Example: {\"NODE_ENV\": \"production\"}"
      pt_BR: "Environment variables for the command, as a JSON object string. Example: {\"NODE_ENV\": \"production\"}"
    llm_description: 'Environment variables for the command, as a JSON object string. Example: {"NODE_ENV": "production"}'
    form: llm
    default: ""
  - name: stream
    type: boolean
    required: false
    label:
      en_US: Stream Output
      zh_Hans: Stream Output
      ja_JP: Stream Output
      pt_BR: Stream Output
    human_description:
      en_US: Stream command output in real-time instead of waiting for completion. Recommended for long-running commands.
      zh_Hans: 流式传输命令输出，而不是等待完成。建议用于长时间运行的命令。
      ja_JP: コマンドの完了を待たずに出力をストリーミングします。長時間実行されるコマンドに推奨されます。
      pt_BR: Transmite a saída do comando em tempo real em vez de aguardar a conclusão. Recomendado para comandos de longa duração.
    llm_description: >-
      When true, streams command output in real-time to the chat as it is produced.
      Recommended for long-running commands such as pip install, npm install, pytest,
      compilation builds, or any command that takes more than a few seconds to complete.
      When false (default), the command blocks until completion and returns all output at once.
    form: llm
    default: false
  - name: sandbox_id
    type: string
    required: false
    label:
      en_US: Sandbox ID
      zh_Hans: Sandbox ID
      ja_JP: Sandbox ID
      pt_BR: Sandbox ID
    human_description:
      en_US: The ID of an existing sandbox. If not provided, a new sandbox will be created and destroyed after execution.
      zh_Hans: The ID of an existing sandbox. If not provided, a new sandbox will be created and destroyed after execution.
      ja_JP: The ID of an existing sandbox. If not provided, a new sandbox will be created and destroyed after execution.
      pt_BR: The ID of an existing sandbox. If not provided, a new sandbox will be created and destroyed after execution.
    llm_description: >-
      The ID of an existing Daytona sandbox. If omitted, the plugin uses the active sandbox from this conversation (the most recently created or used one).
      If no active sandbox exists, a new ephemeral sandbox is created, used, and destroyed automatically.
    form: llm
    default: ""
  - name: input_files
    type: files
    required: false
    label:
      en_US: Input Files
      zh_Hans: Input Files
      ja_JP: Input Files
      pt_BR: Input Files
    human_description:
      en_US: Optional files to upload to the sandbox workspace before executing the command. Files are placed in /home/daytona/workspace/.
      zh_Hans: Optional files to upload to the sandbox workspace before executing the command. Files are placed in /home/daytona/workspace/.
      ja_JP: Optional files to upload to the sandbox workspace before executing the command. Files are placed in /home/daytona/workspace/.
      pt_BR: Optional files to upload to the sandbox workspace before executing the command. Files are placed in /home/daytona/workspace/.
    llm_description: >-
      Optional files from the user to upload into the sandbox before executing the command.
      Files are placed in /home/daytona/workspace/. Use this when the user provides
      a file (CSV, JSON, script, etc.) and wants a command run on it — avoids needing
      a separate upload_file call.
    form: llm
extra:
  python:
    source: tools/run_command.py