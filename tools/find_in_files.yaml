identity:
  name: find_in_files
  author: daytonaio
  label:
    en_US: Find In Files
    zh_Hans: Find In Files
    ja_JP: Find In Files
    pt_BR: Find In Files
description:
  human:
    en_US: Search for text patterns inside files in a sandbox (like grep).
    zh_Hans: Search for text patterns inside files in a sandbox (like grep).
    ja_JP: Search for text patterns inside files in a sandbox (like grep).
    pt_BR: Search for text patterns inside files in a sandbox (like grep).
  llm: Search for a text pattern inside files in a Daytona sandbox (similar to grep). Searches recursively through all files under the given path. Returns the file path, line number, and matching line content for each match. Useful for finding function definitions, TODO comments, configuration values, or any text in the sandbox files.
parameters:
  - name: sandbox_id
    type: string
    required: true
    label:
      en_US: Sandbox ID
      zh_Hans: Sandbox ID
      ja_JP: Sandbox ID
      pt_BR: Sandbox ID
    human_description:
      en_US: The ID of the Daytona sandbox.
      zh_Hans: The ID of the Daytona sandbox.
      ja_JP: The ID of the Daytona sandbox.
      pt_BR: The ID of the Daytona sandbox.
    llm_description: The ID of the Daytona sandbox to search files in.
    form: llm
  - name: path
    type: string
    required: true
    label:
      en_US: Search Path
      zh_Hans: Search Path
      ja_JP: Search Path
      pt_BR: Search Path
    human_description:
      en_US: 'File or directory to search in. Directories are searched recursively (e.g. /home/daytona/src).'
      zh_Hans: 'File or directory to search in. Directories are searched recursively (e.g. /home/daytona/src).'
      ja_JP: 'File or directory to search in. Directories are searched recursively (e.g. /home/daytona/src).'
      pt_BR: 'File or directory to search in. Directories are searched recursively (e.g. /home/daytona/src).'
    llm_description: 'File or directory to search in. Directories are searched recursively (e.g. "/home/daytona/src", ".").'
    form: llm
  - name: pattern
    type: string
    required: true
    label:
      en_US: Search Pattern
      zh_Hans: Search Pattern
      ja_JP: Search Pattern
      pt_BR: Search Pattern
    human_description:
      en_US: 'Text pattern to search for in file contents (e.g. "def main", "TODO", "API_KEY").'
      zh_Hans: 'Text pattern to search for in file contents (e.g. "def main", "TODO", "API_KEY").'
      ja_JP: 'Text pattern to search for in file contents (e.g. "def main", "TODO", "API_KEY").'
      pt_BR: 'Text pattern to search for in file contents (e.g. "def main", "TODO", "API_KEY").'
    llm_description: 'Text pattern to search for inside file contents (e.g. "def main", "import os", "TODO").'
    form: llm
  - name: max_results
    type: number
    required: false
    label:
      en_US: Max Results
      zh_Hans: Max Results
      ja_JP: Max Results
      pt_BR: Max Results
    human_description:
      en_US: Maximum number of matches to return. Defaults to 50.
      zh_Hans: Maximum number of matches to return. Defaults to 50.
      ja_JP: Maximum number of matches to return. Defaults to 50.
      pt_BR: Maximum number of matches to return. Defaults to 50.
    llm_description: Maximum number of matches to return. Defaults to 50. Increase for exhaustive searches.
    form: llm
    default: 50
extra:
  python:
    source: tools/find_in_files.py
