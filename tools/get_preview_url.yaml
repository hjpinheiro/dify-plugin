identity:
  name: get_preview_url
  author: daytonaio
  label:
    en_US: Get Preview URL
    zh_Hans: Get Preview URL
    ja_JP: Get Preview URL
    pt_BR: Get Preview URL
description:
  human:
    en_US: Get a public URL that previews a service (web app, API, dashboard) running on a port inside a Daytona sandbox.
    zh_Hans: Get a public URL that previews a service (web app, API, dashboard) running on a port inside a Daytona sandbox.
    ja_JP: Get a public URL that previews a service (web app, API, dashboard) running on a port inside a Daytona sandbox.
    pt_BR: Get a public URL that previews a service (web app, API, dashboard) running on a port inside a Daytona sandbox.
  llm: 'Get the HTTPS URL that exposes a port from inside a Daytona sandbox. Use this after you start a web server (Flask, Streamlit, Next.js, etc.) so the user can open the running app in their browser. The URL has no expiry and lives as long as the sandbox runs. For private sandboxes, the returned token must be sent in the x-daytona-preview-token header; for public sandboxes the URL works on its own.'
parameters:
  - name: sandbox_id
    type: string
    required: false
    label:
      en_US: Sandbox ID
      zh_Hans: Sandbox ID
      ja_JP: Sandbox ID
      pt_BR: Sandbox ID
    human_description:
      en_US: The ID of the sandbox running the service.
      zh_Hans: The ID of the sandbox running the service.
      ja_JP: The ID of the sandbox running the service.
      pt_BR: The ID of the sandbox running the service.
    llm_description: >-
      The ID of an existing Daytona sandbox. If omitted, the plugin uses the active sandbox from this conversation (the most recently created or used one).
      If no active sandbox exists, an error is returned.
    form: llm
  - name: port
    type: number
    required: true
    label:
      en_US: Port
      zh_Hans: Port
      ja_JP: Port
      pt_BR: Port
    human_description:
      en_US: The port number inside the sandbox where the service is listening (e.g. 3000, 5000, 8080).
      zh_Hans: The port number inside the sandbox where the service is listening (e.g. 3000, 5000, 8080).
      ja_JP: The port number inside the sandbox where the service is listening (e.g. 3000, 5000, 8080).
      pt_BR: The port number inside the sandbox where the service is listening (e.g. 3000, 5000, 8080).
    llm_description: 'The port number inside the sandbox where the service is listening (e.g. 3000 for Next.js, 5000 for Flask, 8080 for generic HTTP, 8501 for Streamlit). Range 1-65535.'
    form: llm
  - name: expires_in_seconds
    type: number
    required: false
    label:
      en_US: Signed URL Expiry (seconds)
      zh_Hans: Signed URL Expiry (seconds)
      ja_JP: Signed URL Expiry (seconds)
      pt_BR: Expiracao da URL assinada (segundos)
    human_description:
      en_US: 'Optional expiry in seconds for signed preview URLs (private sandboxes only). Range: 60-86400. Ignored for public sandboxes.'
      zh_Hans: 'Optional expiry in seconds for signed preview URLs (private sandboxes only). Range: 60-86400. Ignored for public sandboxes.'
      ja_JP: 'Optional expiry in seconds for signed preview URLs (private sandboxes only). Range: 60-86400. Ignored for public sandboxes.'
      pt_BR: 'Expiracao opcional em segundos para URLs de preview assinadas (apenas sandboxes privadas). Intervalo: 60-86400. Ignorado para sandboxes publicas.'
    llm_description: 'Optional expiry in seconds for signed preview URLs. Only applies to private sandboxes. Range: 60-86400 (1 minute to 24 hours). Ignored for public sandboxes.'
    form: llm
  - name: include_token
    type: boolean
    required: false
    default: false
    label:
      en_US: Include Token
      zh_Hans: Include Token
      ja_JP: Include Token
      pt_BR: Include Token
    human_description:
      en_US: 'If true, includes the preview token in the response (needed for private sandboxes). Defaults to false for security.'
      zh_Hans: 'If true, includes the preview token in the response (needed for private sandboxes). Defaults to false for security.'
      ja_JP: 'If true, includes the preview token in the response (needed for private sandboxes). Defaults to false for security.'
      pt_BR: 'If true, includes the preview token in the response (needed for private sandboxes). Defaults to false for security.'
    llm_description: 'Whether to include the preview token in the response. For private sandboxes, the token must be sent via the x-daytona-preview-token header. Defaults to false for security; only enable if the caller needs direct access to the token.'
    form: llm
extra:
  python:
    source: tools/get_preview_url.py
