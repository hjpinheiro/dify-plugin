identity:
  name: download_file
  author: daytonaio
  label:
    en_US: Deliver File to User
    zh_Hans: Deliver File to User
    ja_JP: Deliver File to User
    pt_BR: Entregar Ficheiro ao Utilizador
description:
  human:
    en_US: Deliver a file from a Daytona sandbox to the user as a downloadable attachment in the chat.
    zh_Hans: Deliver a file from a Daytona sandbox to the user as a downloadable attachment in the chat.
    ja_JP: Deliver a file from a Daytona sandbox to the user as a downloadable attachment in the chat.
    pt_BR: Entrega um ficheiro do sandbox Daytona ao utilizador como anexo descarregável no chat.
  llm: >
    DELIVER FILES TO THE USER with this tool. After generating any file in a sandbox
    (e.g. .pptx, .pdf, .csv, .xlsx, .png, .docx, .json, .txt, .zip), ALWAYS call this
    tool to send the file to the user. Images (.png, .jpg) are delivered directly as
    attachments. Non-image files (.pptx, .pdf, .xlsx, .zip, etc.) are uploaded to Dify
    storage and delivered as a download link. If delivery fails, the tool response will
    guide you to alternative delivery (read_file for text, start_service+get_preview_url
    for binary). Simply provide the sandbox_id and the file path inside the sandbox.
parameters:
  - name: sandbox_id
    type: string
    required: false
    label:
      en_US: Sandbox ID
      zh_Hans: Sandbox ID
      ja_JP: Sandbox ID
      pt_BR: Sandbox ID
    human_description:
      en_US: The ID of the sandbox to download the file from.
      zh_Hans: The ID of the sandbox to download the file from.
      ja_JP: The ID of the sandbox to download the file from.
      pt_BR: The ID of the sandbox to download the file from.
    llm_description: >-
      The ID of an existing Daytona sandbox. If omitted, the plugin uses the active sandbox from this conversation (the most recently created or used one).
      If no active sandbox exists, an error is returned.
    form: llm
  - name: remote_path
    type: string
    required: true
    label:
      en_US: Remote Path
      zh_Hans: Remote Path
      ja_JP: Remote Path
      pt_BR: Remote Path
    human_description:
      en_US: 'Absolute path of the file inside the sandbox (e.g. /home/daytona/output.csv).'
      zh_Hans: 'Absolute path of the file inside the sandbox (e.g. /home/daytona/output.csv).'
      ja_JP: 'Absolute path of the file inside the sandbox (e.g. /home/daytona/output.csv).'
      pt_BR: 'Absolute path of the file inside the sandbox (e.g. /home/daytona/output.csv).'
    llm_description: 'Absolute path of the file inside the sandbox to download (e.g. "/home/daytona/output.csv", "/tmp/result.png").'
    form: llm
  - name: output_raw_blob
    type: boolean
    required: false
    default: false
    label:
      en_US: Output Raw Blob (Workflow Mode)
      zh_Hans: Output Raw Blob (Workflow Mode)
      ja_JP: Output Raw Blob (Workflow Mode)
      pt_BR: Output Raw Blob (Modo Workflow)
    human_description:
      en_US: 'When true, always yield the file as a raw blob message regardless of MIME type. Use this in Dify Workflows where a downstream node needs the binary data. In agent/chat mode, leave false to avoid platform crashes with non-image files.'
      zh_Hans: 'When true, always yield the file as a raw blob message regardless of MIME type. Use this in Dify Workflows where a downstream node needs the binary data. In agent/chat mode, leave false to avoid platform crashes with non-image files.'
      ja_JP: 'When true, always yield the file as a raw blob message regardless of MIME type. Use this in Dify Workflows where a downstream node needs the binary data. In agent/chat mode, leave false to avoid platform crashes with non-image files.'
      pt_BR: 'Quando verdadeiro, devolve sempre o ficheiro como blob bruto, independentemente do tipo MIME. Use isto em Dify Workflows onde um nó downstream precisa dos dados binários. Em modo agente/chat, deixe falso para evitar crashes da plataforma com ficheiros não-imagem.'
    llm_description: >-
      Internal: set to true ONLY in Dify Workflow nodes that need raw binary data
      passed to a downstream node. In agent/chat conversations, leave this as false
      (default) so non-image files are delivered safely without crashing the platform.
    form: form
extra:
  python:
    source: tools/download_file.py
