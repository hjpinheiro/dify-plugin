identity:
  name: run_code
  author: daytonaio
  label:
    en_US: Run Code
    zh_Hans: Run Code
    ja_JP: Run Code
    pt_BR: Run Code
description:
  human:
    en_US: Run a snippet of code in a Daytona sandbox and return the output.
    zh_Hans: Run a snippet of code in a Daytona sandbox and return the output.
    ja_JP: Run a snippet of code in a Daytona sandbox and return the output.
    pt_BR: Run a snippet of code in a Daytona sandbox and return the output.
  llm: >
    Execute a code snippet in a Daytona sandbox using its built-in language runtime.
    Supports Python, TypeScript, and JavaScript. If no sandbox_id is provided, a new
    ephemeral sandbox is created with the specified language and destroyed afterward.
    If a sandbox_id is provided, the language parameter is ignored (the sandbox uses
    its own configured language). For larger or multi-file scripts, upload them with
    upload_file and execute via run_command. Returns the combined output (stdout merged
    with stderr) and the exit code. IMPORTANT — when your code generates output files
    (e.g. charts, reports, documents), use a persistent sandbox (provide sandbox_id)
    and then call download_file to deliver the generated file to the user.
parameters:
  - name: code
    type: string
    required: true
    label:
      en_US: Code
      zh_Hans: Code
      ja_JP: Code
      pt_BR: Code
    human_description:
      en_US: The code to execute in the sandbox.
      zh_Hans: The code to execute in the sandbox.
      ja_JP: The code to execute in the sandbox.
      pt_BR: The code to execute in the sandbox.
    llm_description: The source code to execute in the Daytona sandbox.
    form: llm
  - name: language
    type: string
    required: false
    label:
      en_US: Language
      zh_Hans: Language
      ja_JP: Language
      pt_BR: Language
    human_description:
      en_US: Language for the code. Options are python, typescript, or javascript. Defaults to python. Only applies when creating a new ephemeral sandbox; ignored when sandbox_id is provided.
      zh_Hans: Language for the code. Options are python, typescript, or javascript. Defaults to python. Only applies when creating a new ephemeral sandbox; ignored when sandbox_id is provided.
      ja_JP: Language for the code. Options are python, typescript, or javascript. Defaults to python. Only applies when creating a new ephemeral sandbox; ignored when sandbox_id is provided.
      pt_BR: Language for the code. Options are python, typescript, or javascript. Defaults to python. Only applies when creating a new ephemeral sandbox; ignored when sandbox_id is provided.
    llm_description: 'Language of the code, used to create a new ephemeral sandbox. Must be one of: "python", "typescript", or "javascript". Defaults to "python". Ignored when sandbox_id is provided (the existing sandbox uses its own configured language).'
    form: llm
    default: python
  - name: stateful
    type: boolean
    required: false
    label:
      en_US: Stateful Execution
      zh_Hans: Stateful Execution
      ja_JP: Stateful Execution
      pt_BR: Stateful Execution
    human_description:
      en_US: When true, Python code runs in a persistent interpreter context where variables, imports, and functions are preserved across calls within the same sandbox. When false, each execution is independent. Only applies to Python code in a persistent sandbox. Defaults to true.
      zh_Hans: When true, Python code runs in a persistent interpreter context where variables, imports, and functions are preserved across calls within the same sandbox. When false, each execution is independent. Only applies to Python code in a persistent sandbox. Defaults to true.
      ja_JP: When true, Python code runs in a persistent interpreter context where variables, imports, and functions are preserved across calls within the same sandbox. When false, each execution is independent. Only applies to Python code in a persistent sandbox. Defaults to true.
      pt_BR: When true, Python code runs in a persistent interpreter context where variables, imports, and functions are preserved across calls within the same sandbox. When false, each execution is independent. Only applies to Python code in a persistent sandbox. Defaults to true.
    llm_description: >-
      Whether to use a persistent Python interpreter. When true (default) and language is "python",
      code runs in a stateful interpreter where variables, imports, and functions persist across
      multiple calls within the same sandbox session — similar to a Jupyter kernel. When false,
      each code execution is completely independent with no state carried over. Always use true
      when you need to define a variable or function in one call and use it in a later call.
      Has no effect for non-Python languages or when sandbox_id is not provided (ephemeral execution).
    form: llm
    default: true
  - name: sandbox_id
    type: string
    required: false
    label:
      en_US: Sandbox ID
      zh_Hans: Sandbox ID
      ja_JP: Sandbox ID
      pt_BR: Sandbox ID
    human_description:
      en_US: The ID of an existing sandbox. If omitted, the plugin uses the active sandbox from this conversation. If none exists, an ephemeral sandbox is created and destroyed after execution.
      zh_Hans: The ID of an existing sandbox. If omitted, the plugin uses the active sandbox from this conversation. If none exists, an ephemeral sandbox is created and destroyed after execution.
      ja_JP: The ID of an existing sandbox. If omitted, the plugin uses the active sandbox from this conversation. If none exists, an ephemeral sandbox is created and destroyed after execution.
      pt_BR: The ID of an existing sandbox. If omitted, the plugin uses the active sandbox from this conversation. If none exists, an ephemeral sandbox is created and destroyed after execution.
    llm_description: >-
      The ID of an existing Daytona sandbox. If omitted, the plugin uses the active sandbox from this conversation (the most recently created or used one).
      If no active sandbox exists, a new ephemeral sandbox is created, used, and destroyed automatically.
    form: llm
    default: ""
  - name: input_files
    type: files
    required: false
    label:
      en_US: Input Files
      zh_Hans: Input Files
      ja_JP: Input Files
      pt_BR: Input Files
    human_description:
      en_US: Optional files to upload to the sandbox workspace before executing the code. Files are placed in /home/daytona/workspace/.
      zh_Hans: Optional files to upload to the sandbox workspace before executing the code. Files are placed in /home/daytona/workspace/.
      ja_JP: Optional files to upload to the sandbox workspace before executing the code. Files are placed in /home/daytona/workspace/.
      pt_BR: Optional files to upload to the sandbox workspace before executing the code. Files are placed in /home/daytona/workspace/.
    llm_description: >-
      Optional files from the user to upload into the sandbox before running code.
      Files are placed in /home/daytona/workspace/. Use this when the user provides
      a file (CSV, JSON, script, etc.) and wants code executed on it — avoids needing
      a separate upload_file call.
    form: llm
  - name: env_vars
    type: string
    required: false
    label:
      en_US: Environment Variables (JSON)
      zh_Hans: Environment Variables (JSON)
      ja_JP: Environment Variables (JSON)
      pt_BR: Environment Variables (JSON)
    human_description:
      en_US: "Environment variables for the code execution, as a JSON object string. Example: {\"API_KEY\": \"abc\"}"
      zh_Hans: "Environment variables for the code execution, as a JSON object string."
      ja_JP: "Environment variables for the code execution, as a JSON object string."
      pt_BR: "Variaveis de ambiente para a execucao do codigo, como string de objeto JSON."
    llm_description: 'Environment variables for the code execution, as a JSON object string. Example: {"API_KEY": "abc", "DEBUG": "true"}'
    form: llm
    default: ""
  - name: input_text_files
    type: string
    required: false
    label:
      en_US: Input Text Files (JSON)
      zh_Hans: Input Text Files (JSON)
      ja_JP: Input Text Files (JSON)
      pt_BR: Input Text Files (JSON)
    human_description:
      en_US: 'Optional text files to inject as a JSON object mapping workspace-relative paths to file content. Example: {"data.csv": "a,b,c\n1,2,3"}'
      zh_Hans: 'Optional text files to inject as a JSON object mapping workspace-relative paths to file content.'
      ja_JP: 'Optional text files to inject as a JSON object mapping workspace-relative paths to file content.'
      pt_BR: 'Ficheiros de texto opcionais para injetar como objeto JSON mapeando caminhos relativos ao workspace para o conteudo.'
    llm_description: >-
      Optional text files to create in the sandbox workspace before running code.
      Provide a JSON object mapping workspace-relative file paths to their text content.
      Example: {"data.csv": "a,b,c\n1,2,3", "helper.py": "def add(a,b): return a+b"}.
      Files are placed under /home/daytona/workspace/. Use this when you need to
      create data files or helper scripts before running code.
    form: llm
    default: ""
  - name: timeout
    type: number
    required: false
    label:
      en_US: Timeout (seconds)
      zh_Hans: Timeout (seconds)
      ja_JP: Timeout (seconds)
      pt_BR: Timeout (segundos)
    human_description:
      en_US: Maximum execution time in seconds. Defaults to 120. Maximum 600.
      zh_Hans: Maximum execution time in seconds. Defaults to 120. Maximum 600.
      ja_JP: Maximum execution time in seconds. Defaults to 120. Maximum 600.
      pt_BR: Tempo maximo de execucao em segundos. Padrao 120. Maximo 600.
    llm_description: 'Optional timeout in seconds (max 600). Use a higher value for long operations like pip install or pytest.'
    form: llm
extra:
  python:
    source: tools/run_code.py
