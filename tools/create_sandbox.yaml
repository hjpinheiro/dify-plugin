identity:
  name: create_sandbox
  author: daytonaio
  label:
    en_US: Create Sandbox
    zh_Hans: Create Sandbox
    ja_JP: Create Sandbox
    pt_BR: Create Sandbox
description:
  human:
    en_US: 'Create a new Daytona sandbox: an isolated environment for running code and commands securely.'
    zh_Hans: 'Create a new Daytona sandbox: an isolated environment for running code and commands securely.'
    ja_JP: 'Create a new Daytona sandbox: an isolated environment for running code and commands securely.'
    pt_BR: 'Create a new Daytona sandbox: an isolated environment for running code and commands securely.'
  llm: Create a new Daytona sandbox. Returns the sandbox ID which can be used with run_code, run_command, and destroy_sandbox tools. By default it uses Daytona's default snapshot. You can customize the sandbox via snapshot, image, env_vars, resources, or name.
parameters:
  - name: name
    type: string
    required: false
    label:
      en_US: Name
      zh_Hans: Name
      ja_JP: Name
      pt_BR: Name
    human_description:
      en_US: Optional human-readable name for the sandbox. If omitted, the name defaults to the sandbox ID.
      zh_Hans: Optional human-readable name for the sandbox. If omitted, the name defaults to the sandbox ID.
      ja_JP: Optional human-readable name for the sandbox. If omitted, the name defaults to the sandbox ID.
      pt_BR: Optional human-readable name for the sandbox. If omitted, the name defaults to the sandbox ID.
    llm_description: Optional human-readable name for the sandbox. If omitted, the name defaults to the sandbox ID.
    form: llm
    default: ""
  - name: snapshot
    type: string
    required: false
    label:
      en_US: Snapshot
      zh_Hans: Snapshot
      ja_JP: Snapshot
      pt_BR: Snapshot
    human_description:
      en_US: Name of a pre-built Daytona snapshot to use as the sandbox base. Takes priority over image. Uses Daytona default if neither snapshot nor image is provided.
      zh_Hans: Name of a pre-built Daytona snapshot to use as the sandbox base. Takes priority over image. Uses Daytona default if neither snapshot nor image is provided.
      ja_JP: Name of a pre-built Daytona snapshot to use as the sandbox base. Takes priority over image. Uses Daytona default if neither snapshot nor image is provided.
      pt_BR: Name of a pre-built Daytona snapshot to use as the sandbox base. Takes priority over image. Uses Daytona default if neither snapshot nor image is provided.
    llm_description: Name of a pre-built Daytona snapshot to use as the sandbox base. Takes priority over image. Uses Daytona default if neither snapshot nor image is provided.
    form: llm
    default: ""
  - name: image
    type: string
    required: false
    label:
      en_US: Image
      zh_Hans: Image
      ja_JP: Image
      pt_BR: Image
    human_description:
      en_US: Custom Docker image for the sandbox (e.g. "python:3.12-slim", "node:20"). Ignored when snapshot is also set. When using a custom image, you can also specify cpu, memory, and disk.
      zh_Hans: Custom Docker image for the sandbox (e.g. "python:3.12-slim", "node:20"). Ignored when snapshot is also set. When using a custom image, you can also specify cpu, memory, and disk.
      ja_JP: Custom Docker image for the sandbox (e.g. "python:3.12-slim", "node:20"). Ignored when snapshot is also set. When using a custom image, you can also specify cpu, memory, and disk.
      pt_BR: Custom Docker image for the sandbox (e.g. "python:3.12-slim", "node:20"). Ignored when snapshot is also set. When using a custom image, you can also specify cpu, memory, and disk.
    llm_description: Custom Docker image for the sandbox (e.g. "python:3.12-slim", "node:20"). Ignored when snapshot is also set.
    form: llm
    default: ""
  - name: language
    type: string
    required: false
    label:
      en_US: Language
      zh_Hans: Language
      ja_JP: Language
      pt_BR: Language
    human_description:
      en_US: Default programming language runtime for the sandbox (python, typescript, or javascript). Defaults to python.
      zh_Hans: Default programming language runtime for the sandbox (python, typescript, or javascript). Defaults to python.
      ja_JP: Default programming language runtime for the sandbox (python, typescript, or javascript). Defaults to python.
      pt_BR: Default programming language runtime for the sandbox (python, typescript, or javascript). Defaults to python.
    llm_description: Default programming language for code execution. Must be one of "python", "typescript", or "javascript". Defaults to "python".
    form: llm
    default: python
  - name: env_vars
    type: string
    required: false
    label:
      en_US: Environment Variables (JSON)
      zh_Hans: Environment Variables (JSON)
      ja_JP: Environment Variables (JSON)
      pt_BR: Environment Variables (JSON)
    human_description:
      en_US: 'Environment variables to set in the sandbox, as a JSON object string (e.g. {"API_KEY": "abc", "DEBUG": "true"}).'
      zh_Hans: 'Environment variables to set in the sandbox, as a JSON object string (e.g. {"API_KEY": "abc", "DEBUG": "true"}).'
      ja_JP: 'Environment variables to set in the sandbox, as a JSON object string (e.g. {"API_KEY": "abc", "DEBUG": "true"}).'
      pt_BR: 'Environment variables to set in the sandbox, as a JSON object string (e.g. {"API_KEY": "abc", "DEBUG": "true"}).'
    llm_description: 'Environment variables to set inside the sandbox, passed as a JSON object string. Example: {"DATABASE_URL": "postgres://...", "API_KEY": "..."}'
    form: llm
    default: ""
  - name: cpu
    type: number
    required: false
    label:
      en_US: CPU (vCPU)
      zh_Hans: CPU (vCPU)
      ja_JP: CPU (vCPU)
      pt_BR: CPU (vCPU)
    human_description:
      en_US: Number of vCPUs to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      zh_Hans: Number of vCPUs to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      ja_JP: Number of vCPUs to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      pt_BR: Number of vCPUs to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    llm_description: Number of vCPUs to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    form: llm
  - name: memory
    type: number
    required: false
    label:
      en_US: Memory (GiB)
      zh_Hans: Memory (GiB)
      ja_JP: Memory (GiB)
      pt_BR: Memory (GiB)
    human_description:
      en_US: Memory in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      zh_Hans: Memory in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      ja_JP: Memory in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      pt_BR: Memory in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    llm_description: Memory in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    form: llm
  - name: disk
    type: number
    required: false
    label:
      en_US: Disk (GiB)
      zh_Hans: Disk (GiB)
      ja_JP: Disk (GiB)
      pt_BR: Disk (GiB)
    human_description:
      en_US: Disk space in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      zh_Hans: Disk space in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      ja_JP: Disk space in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
      pt_BR: Disk space in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    llm_description: Disk space in GiB to allocate. Only applied when using a custom image; ignored for snapshot-based sandboxes.
    form: llm
  - name: auto_stop_interval
    type: number
    required: false
    label:
      en_US: Auto-stop interval (minutes)
      zh_Hans: Auto-stop interval (minutes)
      ja_JP: Auto-stop interval (minutes)
      pt_BR: Auto-stop interval (minutes)
    human_description:
      en_US: Minutes of inactivity before the sandbox auto-stops. Set to 0 to disable. Defaults to 15.
      zh_Hans: Minutes of inactivity before the sandbox auto-stops. Set to 0 to disable. Defaults to 15.
      ja_JP: Minutes of inactivity before the sandbox auto-stops. Set to 0 to disable. Defaults to 15.
      pt_BR: Minutes of inactivity before the sandbox auto-stops. Set to 0 to disable. Defaults to 15.
    llm_description: Minutes of inactivity before the sandbox auto-stops. Set to 0 to disable auto-stop. Defaults to 15.
    form: llm
    default: 15
  - name: public
    type: boolean
    required: false
    label:
      en_US: Public
      zh_Hans: Public
      ja_JP: Public
      pt_BR: Public
    human_description:
      en_US: 'Whether the sandbox is publicly accessible. Defaults to false (private).'
      zh_Hans: 'Whether the sandbox is publicly accessible. Defaults to false (private).'
      ja_JP: 'Whether the sandbox is publicly accessible. Defaults to false (private).'
      pt_BR: 'Whether the sandbox is publicly accessible. Defaults to false (private).'
    llm_description: 'Whether the sandbox is publicly accessible. Public sandboxes do not require a token for preview URLs. Defaults to false (private).'
    form: llm
  - name: labels
    type: string
    required: false
    label:
      en_US: Labels (JSON)
      zh_Hans: Labels (JSON)
      ja_JP: Labels (JSON)
      pt_BR: Labels (JSON)
    human_description:
      en_US: 'Labels to attach to the sandbox, as a JSON object string (e.g. {"env": "production", "team": "data"}).'
      zh_Hans: 'Labels to attach to the sandbox, as a JSON object string (e.g. {"env": "production", "team": "data"}).'
      ja_JP: 'Labels to attach to the sandbox, as a JSON object string (e.g. {"env": "production", "team": "data"}).'
      pt_BR: 'Labels to attach to the sandbox, as a JSON object string (e.g. {"env": "production", "team": "data"}).'
    llm_description: 'Labels to attach to the sandbox for identification and filtering, as a JSON object string. Example: {"env": "production", "team": "data"}.'
    form: llm
    default: ""
  - name: network_block_all
    type: boolean
    required: false
    label:
      en_US: Block All Network
      zh_Hans: Block All Network
      ja_JP: Block All Network
      pt_BR: Block All Network
    human_description:
      en_US: 'If true, blocks all outbound network access from the sandbox. Use with network_allow_list to permit specific domains.'
      zh_Hans: 'If true, blocks all outbound network access from the sandbox. Use with network_allow_list to permit specific domains.'
      ja_JP: 'If true, blocks all outbound network access from the sandbox. Use with network_allow_list to permit specific domains.'
      pt_BR: 'If true, blocks all outbound network access from the sandbox. Use with network_allow_list to permit specific domains.'
    llm_description: 'If true, blocks all outbound network access from the sandbox. Combine with network_allow_list to permit specific domains only. Useful for running untrusted code safely.'
    form: llm
  - name: network_allow_list
    type: string
    required: false
    label:
      en_US: Network Allow List
      zh_Hans: Network Allow List
      ja_JP: Network Allow List
      pt_BR: Network Allow List
    human_description:
      en_US: 'Comma-separated list of domains to allow outbound access (e.g. "pypi.org,github.com"). Only effective when network_block_all is true.'
      zh_Hans: 'Comma-separated list of domains to allow outbound access (e.g. "pypi.org,github.com"). Only effective when network_block_all is true.'
      ja_JP: 'Comma-separated list of domains to allow outbound access (e.g. "pypi.org,github.com"). Only effective when network_block_all is true.'
      pt_BR: 'Comma-separated list of domains to allow outbound access (e.g. "pypi.org,github.com"). Only effective when network_block_all is true.'
    llm_description: 'Comma-separated list of domains to allow for outbound network access (e.g. "pypi.org,github.com"). Only effective when network_block_all is true.'
    form: llm
    default: ""
  - name: auto_delete_interval
    type: number
    required: false
    label:
      en_US: Auto-delete Interval (minutes)
      zh_Hans: Auto-delete Interval (minutes)
      ja_JP: Auto-delete Interval (minutes)
      pt_BR: Auto-delete Interval (minutes)
    human_description:
      en_US: 'Minutes of inactivity before the sandbox is automatically deleted. Set to 0 to disable. Leave empty for default.'
      zh_Hans: 'Minutes of inactivity before the sandbox is automatically deleted. Set to 0 to disable. Leave empty for default.'
      ja_JP: 'Minutes of inactivity before the sandbox is automatically deleted. Set to 0 to disable. Leave empty for default.'
      pt_BR: 'Minutes of inactivity before the sandbox is automatically deleted. Set to 0 to disable. Leave empty for default.'
    llm_description: 'Minutes of inactivity before the sandbox is automatically deleted permanently. Set to 0 to disable auto-delete. Leave empty for platform default.'
    form: llm
  - name: auto_archive_interval
    type: number
    required: false
    label:
      en_US: Auto-archive Interval (minutes)
      zh_Hans: Auto-archive Interval (minutes)
      ja_JP: Auto-archive Interval (minutes)
      pt_BR: Auto-archive Interval (minutes)
    human_description:
      en_US: 'Minutes of inactivity before the sandbox is automatically archived. Set to 0 to disable. Leave empty for default.'
      zh_Hans: 'Minutes of inactivity before the sandbox is automatically archived. Set to 0 to disable. Leave empty for default.'
      ja_JP: 'Minutes of inactivity before the sandbox is automatically archived. Set to 0 to disable. Leave empty for default.'
      pt_BR: 'Minutes of inactivity before the sandbox is automatically archived. Set to 0 to disable. Leave empty for default.'
    llm_description: 'Minutes of inactivity before the sandbox is automatically archived (cheaper than running but slower to resume). Set to 0 to disable. Leave empty for platform default.'
    form: llm
  - name: ephemeral
    type: boolean
    required: false
    label:
      en_US: Ephemeral
      zh_Hans: Ephemeral
      ja_JP: Ephemeral
      pt_BR: Ephemeral
    human_description:
      en_US: 'If true, the sandbox is automatically deleted when stopped. Defaults to false.'
      zh_Hans: 'If true, the sandbox is automatically deleted when stopped. Defaults to false.'
      ja_JP: 'If true, the sandbox is automatically deleted when stopped. Defaults to false.'
      pt_BR: 'If true, the sandbox is automatically deleted when stopped. Defaults to false.'
    llm_description: 'If true, the sandbox is automatically deleted when stopped rather than remaining in a stopped state. Defaults to false.'
    form: llm
extra:
  python:
    source: tools/create_sandbox.py
